name: انتقال فایل به گیت هاب (بدون اسپلیت)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل مورد نظر'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور برای فایل فشرده'
        required: true
        type: string

permissions:
  contents: write

jobs:
  single-archive-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install 7z
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Download file
        id: download_file
        run: |
          curl -L --fail --retry 3 -o downloaded_file "${{ github.event.inputs.file_url }}"
          echo "downloaded_file_name=downloaded_file" >> $GITHUB_OUTPUT

      - name: Extract and process filename
        id: get_filename
        run: |
          DOWNLOADED_FILE="${{ steps.download_file.outputs.downloaded_file_name }}"
          ORIGINAL_URL="${{ github.event.inputs.file_url }}"

          FILENAME_FROM_URL=$(basename "$ORIGINAL_URL")
          if [[ -z "$FILENAME_FROM_URL" || "$FILENAME_FROM_URL" == "/" ]]; then
            FILENAME_FROM_URL="$DOWNLOADED_FILE"
          fi
          
          FILENAME_BASE=$(echo "$FILENAME_FROM_URL" | sed 's/\.[^.]*$//')
          FILENAME_EXT="${FILENAME_FROM_URL##*.}"
          if [[ "$FILENAME_BASE" == "$FILENAME_FROM_URL" ]]; then
            FILENAME_EXT=""
          fi

          ARCHIVE_PREFIX="mova_"
          FULL_ARCHIVE_NAME="${ARCHIVE_PREFIX}${FILENAME_BASE}"

          MAX_TOTAL_LEN=50
          if [[ ${#FULL_ARCHIVE_NAME} -gt $MAX_TOTAL_LEN ]]; then
            BASE_LEN_TO_KEEP=$((MAX_TOTAL_LEN - ${#ARCHIVE_PREFIX} - ${#FILENAME_EXT} - 1))
            [[ $BASE_LEN_TO_KEEP -lt 1 ]] && BASE_LEN_TO_KEEP=1
            SHORT_FILENAME_BASE=$(echo "$FILENAME_BASE" | cut -c 1-$BASE_LEN_TO_KEEP)
            FULL_ARCHIVE_NAME="${ARCHIVE_PREFIX}${SHORT_FILENAME_BASE}"
          fi
          
          if [[ -n "$FILENAME_EXT" ]]; then
            FINAL_ARCHIVE_FILENAME="${FULL_ARCHIVE_NAME}.${FILENAME_EXT}"
          else
            FINAL_ARCHIVE_FILENAME="${FULL_ARCHIVE_NAME}"
          fi

          echo "archive_base_name=${FULL_ARCHIVE_NAME}" >> $GITHUB_OUTPUT
          echo "downloaded_file_name=${DOWNLOADED_FILE}" >> $GITHUB_OUTPUT
          echo "file_extension=${FILENAME_EXT}" >> $GITHUB_OUTPUT
          echo "final_archive_name=${FINAL_ARCHIVE_FILENAME}" >> $GITHUB_OUTPUT

      - name: Rename downloaded file
        id: rename_file
        run: |
          PREFIX="${{ steps.get_filename.outputs.archive_base_name }}"
          EXT="${{ steps.get_filename.outputs.file_extension }}"
          DL_FILE="${{ steps.get_filename.outputs.downloaded_file_name }}"

          NEW_NAME="$PREFIX"
          [[ -n "$EXT" ]] && NEW_NAME="${PREFIX}.${EXT}"

          mv "$DL_FILE" "$NEW_NAME"
          echo "new_original_filename=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Create encrypted archive (NO SPLIT)
        run: |
          PREFIX="${{ steps.get_filename.outputs.archive_base_name }}"
          ORIGINAL="${{ steps.rename_file.outputs.new_original_filename }}"

          # بدون split فایل را کامل فشرده می‌کنیم
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=5 "${PREFIX}.7z" "$ORIGINAL"

      - name: Remove original file
        run: |
          FILE="${{ steps.rename_file.outputs.new_original_filename }}"
          [[ -f "$FILE" ]] && rm "$FILE"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"

      - name: Commit and Push archive
        run: |
          PREFIX="${{ steps.get_filename.outputs.archive_base_name }}"

          git add "${PREFIX}.7z" || echo "No archive found"

          if ! git diff --staged --quiet; then
            git commit -m "Add full archive for ${{ steps.get_filename.outputs.final_archive_name }}"
            git push origin HEAD
            echo "Archive pushed."
          else
            echo "No changes to push."
          fi
